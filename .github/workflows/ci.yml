name: Build status

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: pnpm/action-setup@v5
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Deploy via SFTP with SSH Key
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          # Set up SSH key
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/sftp_key
          chmod 600 ~/.ssh/sftp_key

          # Add host to known hosts to avoid prompt
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

          SFTP_KEY=~/.ssh/sftp_key
          SFTP_DEST="${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"
          DEPLOY_TS=$(date +%s)

          # Generate manifest of current build (deployed alongside the site)
          find public -type f | sed 's|^public/||' | sort > public/.deploy-manifest

          # Pass 1: Download manifest from current live site
          {
            echo "cd ${{ secrets.SSH_PATH }}"
            echo "-get live/.deploy-manifest old-web-manifest.txt"
            echo "bye"
          } > sftp_get_web_manifest.txt
          sftp -oBatchMode=no -oIdentityFile=${SFTP_KEY} -b sftp_get_web_manifest.txt ${SFTP_DEST} 2>/dev/null || true

          # Pass 2: Deploy and clean up
          {
            echo "cd ${{ secrets.SSH_PATH }}"

            # 1. Upload to _staging_web_<ts>
            echo "-mkdir _staging_web_${DEPLOY_TS}"
            find public -mindepth 1 -type d | sort | while read -r dir; do
              echo "-mkdir _staging_web_${DEPLOY_TS}/${dir#public/}"
            done
            find public -type f | sort | while read -r file; do
              remote="${file#public/}"
              echo "put $file _staging_web_${DEPLOY_TS}/$remote"
            done

            # 2. Clean up leftover _old_web from a previous failed deploy
            if [[ -f old-web-manifest.txt ]]; then
              while IFS= read -r file; do
                echo "-rm _old_web/$file"
              done < old-web-manifest.txt
              sed 's|/[^/]*$||' old-web-manifest.txt | sort -ru | while IFS= read -r dir; do
                [[ -n "$dir" ]] && echo "-rmdir _old_web/$dir"
              done
            fi
            echo "-rmdir _old_web"

            # 3. Swap: live → _old_web, _staging_web_<ts> → live
            echo "rename live _old_web"
            echo "rename _staging_web_${DEPLOY_TS} live"

            # 4. Clean up _old_web using the old manifest (exact file list)
            if [[ -f old-web-manifest.txt ]]; then
              while IFS= read -r file; do
                echo "-rm _old_web/$file"
              done < old-web-manifest.txt
              sed 's|/[^/]*$||' old-web-manifest.txt | sort -ru | while IFS= read -r dir; do
                [[ -n "$dir" ]] && echo "-rmdir _old_web/$dir"
              done
            fi
            echo "-rmdir _old_web"

            echo "bye"
          } > sftp_web_commands.txt

          # Execute SFTP deployment
          sftp -oBatchMode=no -oIdentityFile=${SFTP_KEY} -b sftp_web_commands.txt ${SFTP_DEST}

      - name: Deploy app via SFTP (blue/green)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          SFTP_KEY=~/.ssh/sftp_key
          SFTP_DEST="${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"
          DEPLOY_TS=$(date +%s)

          # Generate manifest of current app build
          find dist-app -type f | sed 's|^dist-app/||' | sort > dist-app/.deploy-manifest

          # Pass 1: Download manifest from current live app
          {
            echo "cd ${{ secrets.SSH_PATH }}"
            echo "-get app/.deploy-manifest old-app-manifest.txt"
            echo "bye"
          } > sftp_get_app_manifest.txt
          sftp -oBatchMode=no -oIdentityFile=${SFTP_KEY} -b sftp_get_app_manifest.txt ${SFTP_DEST} 2>/dev/null || true

          # Pass 2: Deploy and clean up
          {
            echo "cd ${{ secrets.SSH_PATH }}"

            # 1. Upload to _staging_app_<ts>
            echo "-mkdir _staging_app_${DEPLOY_TS}"
            find dist-app -mindepth 1 -type d | sort | while read -r dir; do
              echo "-mkdir _staging_app_${DEPLOY_TS}/${dir#dist-app/}"
            done
            find dist-app -type f | sort | while read -r file; do
              remote="${file#dist-app/}"
              echo "put $file _staging_app_${DEPLOY_TS}/$remote"
            done

            # 2. Clean up leftover _old_app from a previous failed deploy
            if [[ -f old-app-manifest.txt ]]; then
              while IFS= read -r file; do
                echo "-rm _old_app/$file"
              done < old-app-manifest.txt
              sed 's|/[^/]*$||' old-app-manifest.txt | sort -ru | while IFS= read -r dir; do
                [[ -n "$dir" ]] && echo "-rmdir _old_app/$dir"
              done
            fi
            echo "-rmdir _old_app"

            # 3. Swap: app → _old_app, _staging_app_<ts> → app
            echo "rename app _old_app"
            echo "rename _staging_app_${DEPLOY_TS} app"

            # 4. Clean up _old_app using the old manifest
            if [[ -f old-app-manifest.txt ]]; then
              while IFS= read -r file; do
                echo "-rm _old_app/$file"
              done < old-app-manifest.txt
              sed 's|/[^/]*$||' old-app-manifest.txt | sort -ru | while IFS= read -r dir; do
                [[ -n "$dir" ]] && echo "-rmdir _old_app/$dir"
              done
            fi
            echo "-rmdir _old_app"

            echo "bye"
          } > sftp_app_commands.txt

          sftp -oBatchMode=no -oIdentityFile=${SFTP_KEY} -b sftp_app_commands.txt ${SFTP_DEST}

      - name: Clean up deployment credentials
        if: always()
        run: |
          rm -f ~/.ssh/sftp_key sftp_web_commands.txt sftp_get_web_manifest.txt sftp_app_commands.txt sftp_get_app_manifest.txt
